sonar.projectKey=filmate-userfrontend
sonar.projectName=Filmate UserFrontend
sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=src,tests
sonar.test.inclusions=src/**/*.test.js,src/**/*.test.jsx,tests/**/*.spec.js
sonar.exclusions=dist/**,coverage/**,node_modules/**,playwright-report/**,test-results/**,docs/manual-usuario/capturas/**,src/**/*.test.js,src/**/*.test.jsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Configure these outside the repository when running against SonarQube/SonarCloud:
# SONAR_HOST_URL=http://localhost:9000
# SONAR_TOKEN=<token>
